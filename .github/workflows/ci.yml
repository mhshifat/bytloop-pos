name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend — lint · typecheck · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bytloop_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_SECRET_KEY: ci-secret
      AUTH_JWT_SECRET: ci-jwt-secret-placeholder-0000000000000000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bytloop_pos_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bytloop_pos_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        working-directory: backend
        run: uv sync --all-groups
      - name: Ruff
        working-directory: backend
        run: uv run ruff check .
      - name: mypy --strict
        working-directory: backend
        run: uv run mypy src
      - name: import-linter
        working-directory: backend
        run: uv run lint-imports
      - name: pytest
        working-directory: backend
        run: uv run pytest
      - name: schemathesis (contract fuzz)
        working-directory: backend
        # Hits the ASGI app directly — no live server needed. Exclude the
        # OAuth + webhook routers: Authlib needs real redirect URLs and
        # provider webhooks require upstream signatures that don't fit the
        # generic fuzzer.
        run: >
          uv run schemathesis run
          --app src.main:app
          --checks all
          --hypothesis-max-examples 20
          --exclude-path-regex "^/(auth/oauth|payments/webhooks)"
          /openapi.json

  frontend:
    name: frontend — lint · typecheck · test · build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_SERVER_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck
      - name: Unit tests
        working-directory: frontend
        run: pnpm test:coverage
      - name: Build
        working-directory: frontend
        run: pnpm build

  e2e:
    name: e2e — Playwright (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bytloop_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: development
      APP_SECRET_KEY: ci-secret
      AUTH_JWT_SECRET: ci-jwt-secret-placeholder-0000000000000000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bytloop_pos_test
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_SERVER_BASE_URL: http://localhost:8000
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-groups
      - name: Apply migrations
        working-directory: backend
        env:
          # Alembic needs the sync driver URL
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bytloop_pos_test
        run: uv run alembic upgrade head
      - name: Start backend (background)
        working-directory: backend
        run: |
          uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --log-level warning &
          echo $! > /tmp/backend.pid
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health/live >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright
        working-directory: frontend
        # Reuses the built-in webServer block from playwright.config.ts (CI mode
        # runs `pnpm build && pnpm start`).
        run: pnpm e2e
      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill "$(cat /tmp/backend.pid)" || true; fi
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
