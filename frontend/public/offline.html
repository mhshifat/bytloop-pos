<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline · Bytloop POS</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #e5e7eb;
        font: 500 15px/1.4 system-ui, sans-serif;
      }
      main { max-width: 28rem; padding: 2rem; text-align: center; }
      h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
      p { margin: 0 0 0.75rem; color: #9ca3af; }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        background: #6366f1;
        color: white;
        border: 0;
        border-radius: 0.5rem;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Sales taken right now are being queued locally and will sync when the connection returns.</p>
      <p>You can keep using the POS.</p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
