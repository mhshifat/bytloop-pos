<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Bytloop POS">
  <title>Bytloop POS</title>
  <defs>
    <linearGradient id="bytloop-mark-bg" x1="4" y1="4" x2="30" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bytloop-mark-ribbon" x1="6" y1="22" x2="24" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="bytloop-mark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.45" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bytloop-mark-bg)"/>
  <g filter="url(#bytloop-mark-glow)" opacity="0.98">
    <path fill="rgba(255,255,255,0.1)" d="M7 12.4 L16 7.6 L25 12.4 L16 17.1 Z"/>
    <path fill="rgba(255,255,255,0.2)" d="M7 16.1 L16 11.2 L25 16.1 L16 20.8 Z"/>
    <path fill="rgba(255,255,255,0.3)" d="M7 19.7 L16 15 L25 19.7 L16 24.3 Z"/>
  </g>
  <path fill="none" stroke="url(#bytloop-mark-ribbon)" stroke-width="1.85" stroke-linecap="round"
    d="M6.2 22.2 Q 16 5.8 25.8 22.2"/>
  <circle cx="24.2" cy="8.2" r="1.2" fill="#a5f3fc"/>
</svg>
