[importlinter]
root_package = src
include_external_packages = True

; ──────────────────────────────────────────────
; Module boundary contracts (docs/PLAN.md §6).
; Other modules may ONLY import a target module's public ``api.py``.
; ──────────────────────────────────────────────

[importlinter:contract:core-is-acyclic]
name = core must not depend on modules or verticals
type = forbidden
source_modules =
    src.core
forbidden_modules =
    src.modules
    src.verticals

[importlinter:contract:identity-internals-private]
name = identity internals are private
type = forbidden
source_modules =
    src.modules.audit
    src.modules.catalog
    src.modules.customers
    src.modules.discounts
    src.modules.inventory
    src.modules.reporting
    src.modules.sales
    src.modules.shifts
    src.modules.tax
    src.modules.tenants
forbidden_modules =
    src.modules.identity.entity
    src.modules.identity.repository
    src.modules.identity.service
    src.modules.identity.router
    src.modules.identity.schemas
    src.modules.identity.oauth
    src.modules.identity.oauth_router

